<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            text-shadow: 0 0 10px #00f2fe;
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
            border: 4px solid #0f3460;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
            border-radius: 10px;
        }

        canvas {
            display: block;
            background-color: #16213e;
        }

        .score-board {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #e94560;
        }
    </style>
</head>
<body>

    <h1>NEON SNAKE</h1>
    <div class="score-board">Score: <span id="scoreVal">0</span></div>
    
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>

    <audio id="eatSound" src="eat.mp3"></audio>
    <audio id="gameOverSound" src="gameover.mp3"></audio>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        
        // Sounds
        const eatSound = document.getElementById("eatSound");
        const gameOverSound = document.getElementById("gameOverSound");

        const box = 20; // Kích thước 1 ô
        let score = 0;
        let gameSpeed = 100;

        // Khởi tạo rắn
        let snake = [{ x: 9 * box, y: 10 * box }];

        // Khởi tạo mồi
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d; // Hướng di chuyển

        document.addEventListener("keydown", direction);

        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            // Xóa canvas mỗi frame
            ctx.fillStyle = "#16213e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                // Hiệu ứng đổ bóng Neon cho rắn
                ctx.shadowBlur = 15;
                ctx.shadowColor = i == 0 ? "#00f2fe" : "#4facfe";
                
                ctx.fillStyle = (i == 0) ? "#00f2fe" : "#4facfe";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                
                // Vẽ viền nhỏ cho các đốt thân
                ctx.strokeStyle = "#16213e";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Vẽ mồi với hiệu ứng tỏa sáng đỏ
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#e94560";
            ctx.fillStyle = "#e94560";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Vị trí đầu rắn cũ
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Di chuyển đầu rắn
            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // Kiểm tra ăn mồi
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                // Phát âm thanh ăn
                eatSound.play();
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop(); // Xóa đuôi
            }

            let newHead = { x: snakeX, y: snakeY };

            // Kiểm tra va chạm (Tường hoặc chính mình)
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                gameOverSound.play();
                alert("GAME OVER! Điểm của bạn: " + score);
                location.reload(); // Chơi lại
            }

            snake.unshift(newHead);
        }

        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
