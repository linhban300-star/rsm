<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake Game</title>

<style>

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
background:#1a1a2e;
color:white;
font-family:sans-serif;
}

h1{
text-shadow:0 0 10px #00f2fe;
}

#game-container{
border:4px solid #0f3460;
box-shadow:0 0 20px rgba(0,242,254,0.5);
border-radius:10px;
}

canvas{
background:#16213e;
}

.score-board{
font-size:22px;
margin:10px;
color:#e94560;
font-weight:bold;
}

.controls{
margin-top:15px;
display:grid;
grid-template-columns:60px 60px 60px;
grid-gap:10px;
justify-content:center;
}

button{
font-size:25px;
padding:10px;
border:none;
border-radius:10px;
background:#0f3460;
color:white;
}

button:active{
background:#e94560;
}

</style>
</head>

<body>

<h1>NEON SNAKE</h1>

<div class="score-board">
Score: <span id="scoreVal">0</span>
</div>

<div id="game-container">
<canvas id="snakeGame" width="400" height="400"></canvas>
</div>

<!-- Nút điều khiển điện thoại -->

<div class="controls">

<div></div>
<button onclick="setDir('UP')">⬆</button>
<div></div>

<button onclick="setDir('LEFT')">⬅</button>
<button onclick="setDir('DOWN')">⬇</button>
<button onclick="setDir('RIGHT')">➡</button>

</div>

<script>

const canvas=document.getElementById("snakeGame")
const ctx=canvas.getContext("2d")
const scoreElement=document.getElementById("scoreVal")

const box=20

let snake=[{x:9*box,y:10*box}]
let score=0
let d

let food={
x:Math.floor(Math.random()*19+1)*box,
y:Math.floor(Math.random()*19+1)*box
}

document.addEventListener("keydown",direction)

function direction(event){

if(event.keyCode==37 && d!="RIGHT") d="LEFT"
else if(event.keyCode==38 && d!="DOWN") d="UP"
else if(event.keyCode==39 && d!="LEFT") d="RIGHT"
else if(event.keyCode==40 && d!="UP") d="DOWN"

}

function setDir(dir){

if(dir=="LEFT" && d!="RIGHT") d="LEFT"
if(dir=="RIGHT" && d!="LEFT") d="RIGHT"
if(dir=="UP" && d!="DOWN") d="UP"
if(dir=="DOWN" && d!="UP") d="DOWN"

}

function collision(head,array){

for(let i=0;i<array.length;i++){
if(head.x==array[i].x && head.y==array[i].y) return true
}

return false
}

function draw(){

ctx.fillStyle="#16213e"
ctx.fillRect(0,0,canvas.width,canvas.height)

for(let i=0;i<snake.length;i++){

ctx.shadowBlur=15
ctx.shadowColor=i==0?"#00f2fe":"#4facfe"

ctx.fillStyle=i==0?"#00f2fe":"#4facfe"
ctx.fillRect(snake[i].x,snake[i].y,box,box)

ctx.strokeStyle="#16213e"
ctx.strokeRect(snake[i].x,snake[i].y,box,box)

}

ctx.shadowBlur=20
ctx.shadowColor="#e94560"
ctx.fillStyle="#e94560"

ctx.beginPath()
ctx.arc(food.x+box/2,food.y+box/2,box/2-2,0,Math.PI*2)
ctx.fill()

let snakeX=snake[0].x
let snakeY=snake[0].y

if(d=="LEFT") snakeX-=box
if(d=="UP") snakeY-=box
if(d=="RIGHT") snakeX+=box
if(d=="DOWN") snakeY+=box

if(snakeX==food.x && snakeY==food.y){

score++
scoreElement.innerHTML=score

food={
x:Math.floor(Math.random()*19+1)*box,
y:Math.floor(Math.random()*19+1)*box
}

}else{

snake.pop()

}

let newHead={x:snakeX,y:snakeY}

if(snakeX<0 || snakeX>=canvas.width || snakeY<0 || snakeY>=canvas.height || collision(newHead,snake)){

clearInterval(game)
alert("GAME OVER! Điểm: "+score)
location.reload()

}

snake.unshift(newHead)

}

let game=setInterval(draw,100)

</script>

</body>
</html>
